<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sermfy Blog</title>
<meta name="description" content="Tips, guides and updates from the Sermfy team — church management made simple.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1a36;--blue:#1a6fe8;--blue-lt:#e8f0fe;
  --green:#22c55e;--green-dk:#16a34a;
  --white:#fff;--bg:#f2f5f9;
  --border:#dde3ed;--border-lt:#eef1f6;
  --text:#111827;--text2:#374151;--muted:#6b7280;--light:#9ca3af;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 14px rgba(0,0,0,.1);--sh-lg:0 8px 28px rgba(0,0,0,.14);
}
html{scroll-behavior:smooth}
body{font-family:"Plus Jakarta Sans",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

/* ── TOPBAR ── */
.topbar{background:var(--white);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.topbar-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.logo img{height:28px;width:auto}
.logo-tag{font-size:12px;font-weight:700;color:var(--muted);background:#f1f5f9;padding:3px 10px;border-radius:20px;letter-spacing:.2px}
.topbar-links{display:flex;gap:4px;margin-left:auto;align-items:center}
.topbar-link{font-size:13.5px;font-weight:600;color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;transition:.12s;text-decoration:none;border:none;background:none;font-family:inherit}
.topbar-link:hover{background:#f1f5f9;color:var(--text2)}
.topbar-link.primary{background:var(--navy);color:#fff;border-radius:20px;padding:8px 18px}
.topbar-link.primary:hover{background:#162244}
.search-wrap{position:relative;flex:1;max-width:320px;margin:0 auto}
.search-wrap input{width:100%;padding:8px 14px 8px 36px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13.5px;background:#fafbfc;outline:none;transition:.15s;color:var(--text)}
.search-wrap input:focus{border-color:var(--blue);background:var(--white)}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#0c1a36 0%,#1a3464 100%);padding:60px 24px 52px;text-align:center;color:#fff;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 70% 50%,rgba(26,111,232,.18) 0%,transparent 60%);pointer-events:none}
.hero-eyebrow{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.hero h1{font-size:38px;font-weight:800;letter-spacing:-.6px;margin-bottom:10px;line-height:1.2}
.hero p{font-size:16px;color:rgba(255,255,255,.65);max-width:480px;margin:0 auto}

/* ── LAYOUT ── */
.container{max-width:1100px;margin:0 auto;padding:0 24px}

/* ── POST LIST ── */
.posts-section{padding:40px 0}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);margin-bottom:16px}

/* Featured post */
.post-featured{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:32px;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.post-featured:hover{border-color:#b8d0ff;box-shadow:var(--sh-md);transform:translateY(-2px)}
.post-featured-img{background:var(--navy);min-height:280px;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden}
.post-featured-img img{width:100%;height:100%;object-fit:cover;display:block}
.post-featured-body{padding:32px 36px;display:flex;flex-direction:column;justify-content:center}
.post-featured-body .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.post-featured-body h2{font-size:24px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:10px}
.post-featured-body .excerpt{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:18px}
.post-featured-body .meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--light)}
.read-more{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--blue);margin-top:16px}
.read-more svg{transition:transform .15s}
.post-featured:hover .read-more svg{transform:translateX(4px)}

/* Post grid */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.post-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.post-card:hover{border-color:#b8d0ff;box-shadow:var(--sh-md);transform:translateY(-2px)}
.post-card-img{height:180px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden}
.post-card-img img{width:100%;height:100%;object-fit:cover;display:block}
.post-card-body{padding:18px 20px 20px}
.post-card-body .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.post-card-body h3{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:7px}
.post-card-body .excerpt{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.post-card-body .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--light)}
.post-card-body .author{display:flex;align-items:center;gap:6px}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Tag pill */
.tag{font-size:11px;font-weight:700;background:var(--blue-lt);color:var(--blue);padding:2px 9px;border-radius:12px}

/* ── SINGLE POST ── */
.post-page{display:none;min-height:100vh}
.post-page.active{display:block}
.post-hero{background:linear-gradient(135deg,#0c1a36,#1a3464);padding:48px 24px 40px;color:#fff}
.post-hero-inner{max-width:780px;margin:0 auto}
.post-hero .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.post-hero .tags .tag{background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)}
.post-hero h1{font-size:36px;font-weight:800;line-height:1.25;margin-bottom:16px;letter-spacing:-.4px}
.post-hero .meta{display:flex;align-items:center;gap:16px;font-size:13.5px;color:rgba(255,255,255,.6);flex-wrap:wrap}
.post-hero .author{display:flex;align-items:center;gap:7px}
.post-hero .avatar{background:rgba(255,255,255,.2)}
.post-feat-img{width:100%;max-height:440px;object-fit:cover;display:block}
.post-body-wrap{max-width:780px;margin:0 auto;padding:48px 24px 80px}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;margin-bottom:32px;font-family:inherit;transition:.12s}
.back-btn:hover{background:#f8fafc;color:var(--text2)}
.post-body{font-size:17px;line-height:1.85;color:var(--text2)}
.post-body h1{font-size:28px;font-weight:800;color:var(--text);margin:32px 0 14px;line-height:1.3}
.post-body h2{font-size:22px;font-weight:700;color:var(--text);margin:26px 0 12px;line-height:1.35}
.post-body h3{font-size:18px;font-weight:700;color:var(--text);margin:20px 0 10px}
.post-body p{margin-bottom:18px}
.post-body ul,.post-body ol{padding-left:26px;margin-bottom:18px}
.post-body li{margin-bottom:7px}
.post-body blockquote{border-left:4px solid var(--blue);padding:14px 22px;background:var(--blue-lt);border-radius:0 10px 10px 0;margin:22px 0;font-style:italic;color:var(--text2)}
.post-body .callout{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;margin:20px 0;display:flex;gap:10px;color:#92400e;font-size:16px}
.post-body .faq-block{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:18px 22px;margin:16px 0}
.post-body .faq-q{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.post-body .faq-a{font-size:15px;color:var(--muted);line-height:1.7}
.post-body hr{border:none;border-top:2px solid var(--border-lt);margin:28px 0}
.post-body pre{background:#0f172a;color:#e2e8f0;border-radius:10px;padding:20px 22px;font-size:14px;line-height:1.7;overflow-x:auto;margin:20px 0}
.post-body figure{margin:24px 0;text-align:center}
.post-body figure img{max-width:100%;border-radius:12px;border:1px solid var(--border);box-shadow:var(--sh-md);cursor:zoom-in;transition:.2s;display:inline-block}
.post-body figure img:hover{transform:scale(1.01);box-shadow:var(--sh-lg)}
.post-body figcaption{font-size:13px;color:var(--light);margin-top:8px;font-style:italic}
.post-body img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:18px 0;display:block;cursor:zoom-in}
.post-body strong{font-weight:700;color:var(--text)}
.post-body a{color:var(--blue);text-decoration:underline}

/* Related posts */
.related-section{border-top:1.5px solid var(--border-lt);padding-top:32px;margin-top:48px}
.related-section h3{font-size:18px;font-weight:700;margin-bottom:20px}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:80px 24px;color:var(--light)}
.empty-state h3{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:28px 24px;font-size:13px}
footer a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:600}
footer a:hover{color:#fff}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:92vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:500;display:none;align-items:center;gap:8px;box-shadow:var(--sh-lg)}
.toast.show{display:flex}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .post-featured{grid-template-columns:1fr}
  .post-featured-img{min-height:220px}
  .posts-grid{grid-template-columns:repeat(2,1fr)}
  .related-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .hero h1{font-size:26px}
  .hero{padding:40px 16px 36px}
  .posts-grid{grid-template-columns:1fr}
  .related-grid{grid-template-columns:1fr}
  .post-hero h1{font-size:24px}
  .post-body-wrap{padding:28px 16px 60px}
  .post-body{font-size:15.5px}
  .topbar-links .topbar-link:not(.primary){display:none}
  .search-wrap{max-width:none;flex:1}
}
</style>
</head>

<script>
// ═══════════════════════════════════════
// CONFIG — update these when you deploy
// ═══════════════════════════════════════
const SB_URL = 'https://kmzaqlewjxqabuudlsuw.supabase.co';
const SB_KEY = 'sb_publishable_C0SO5y5dAy8LyUeLauo11A_9X2hkyIE';
const HELP_URL = 'https://sermfy-help.vercel.app'; // update when ready

const H = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const strip = h => { const d=document.createElement('div'); d.innerHTML=h||''; return d.textContent||''; };
const fmt = d => { try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }catch{ return d||''; } };

// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
async function sbFetch(params) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/blogs?select=*&status=eq.live&${params||''}order=created_at.desc`, {
      headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY, Accept: 'application/json' }
    });
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let allPosts = [];
let currentPost = null;
const BG = ['#0c1a36','#1a3464','#166534','#7c3aed','#b45309','#0369a1','#0f766e','#9f1239'];
const EMOJI = ['⛪','📊','💰','📱','🏛️','👥','📖','✨','🎵','🙏'];

// ═══════════════════════════════════════
// RENDER POST LIST
// ═══════════════════════════════════════
function renderList(posts) {
  const container = document.getElementById('posts-container');
  if (!posts.length) {
    container.innerHTML = '<div class="empty-state"><h3>No posts yet</h3><p>Check back soon for articles and updates.</p></div>';
    return;
  }

  const [featured, ...rest] = posts;

  let html = '';

  // Featured post
  html += buildFeaturedCard(featured, 0);

  // Grid
  if (rest.length) {
    html += '<div class="section-label">More Articles</div>';
    html += '<div class="posts-grid">' + rest.map((p,i) => buildCard(p, i+1)).join('') + '</div>';
  }

  container.innerHTML = html;
}

function buildFeaturedCard(p, i) {
  const tags = (p.tag||'Post').split(',').map(t=>t.trim()).filter(Boolean);
  const fi = p.feature_image||'';
  return `<div class="section-label">Featured</div>
  <div class="post-featured" onclick="openPost('${p.id}')">
    <div class="post-featured-img">${fi?`<img src="${H(fi)}" alt="${H(p.title)}">`:`<span>${EMOJI[i%EMOJI.length]}</span>`}</div>
    <div class="post-featured-body">
      <div class="tags">${tags.map(t=>`<span class="tag">${H(t)}</span>`).join('')}</div>
      <h2>${H(p.title)}</h2>
      <p class="excerpt">${H(strip(p.body||'').substring(0,200))}…</p>
      <div class="meta">
        ${p.author?`<div class="author"><div class="avatar">${p.author.charAt(0).toUpperCase()}</div>${H(p.author)}</div>`:''}
        <span>${H(p.date||fmt(p.created_at))}</span>
      </div>
      <div class="read-more">Read article <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
  </div>`;
}

function buildCard(p, i) {
  const tags = (p.tag||'Post').split(',').map(t=>t.trim()).filter(Boolean);
  const fi = p.feature_image||'';
  return `<div class="post-card" onclick="openPost('${p.id}')">
    <div class="post-card-img" style="background:${BG[i%BG.length]}">${fi?`<img src="${H(fi)}" alt="${H(p.title)}">`:`<span>${EMOJI[i%EMOJI.length]}</span>`}</div>
    <div class="post-card-body">
      <div class="tags">${tags.map(t=>`<span class="tag">${H(t)}</span>`).join('')}</div>
      <h3>${H(p.title)}</h3>
      <p class="excerpt">${H(strip(p.body||'').substring(0,110))}…</p>
      <div class="meta">
        ${p.author?`<div class="author"><div class="avatar">${p.author.charAt(0).toUpperCase()}</div>${H(p.author)}</div>`:''}
        <span>${H(p.date||fmt(p.created_at))}</span>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// OPEN SINGLE POST
// ═══════════════════════════════════════
function openPost(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  currentPost = p;

  const tags = (p.tag||'Post').split(',').map(t=>t.trim()).filter(Boolean);
  const fi = p.feature_image||'';

  // Post hero + feature image
  document.getElementById('post-content').innerHTML = `
    <div class="post-hero">
      <div class="post-hero-inner">
        <div class="tags">${tags.map(t=>`<span class="tag">${H(t)}</span>`).join('')}</div>
        <h1>${H(p.title)}</h1>
        <div class="meta">
          ${p.author?`<div class="author"><div class="avatar">${p.author.charAt(0).toUpperCase()}</div>${H(p.author)}</div>`:''}
          <span>${H(p.date||fmt(p.created_at))}</span>
        </div>
      </div>
    </div>
    ${fi?`<img src="${H(fi)}" class="post-feat-img" alt="${H(p.title)}">`:''}`;

  // Body
  document.getElementById('post-body').innerHTML = p.body || '<p>Content coming soon.</p>';

  // Related posts
  const related = allPosts.filter(x => x.id !== p.id).slice(0,3);
  if (related.length) {
    document.getElementById('related-posts').innerHTML = `
      <div class="related-section">
        <h3>More Articles</h3>
        <div class="related-grid">${related.map((r,i) => buildCard(r,i+10)).join('')}</div>
      </div>`;
  } else {
    document.getElementById('related-posts').innerHTML = '';
  }

  // Show post page
  document.getElementById('page-list').style.display = 'none';
  document.getElementById('page-search').style.display = 'none';
  document.getElementById('page-post').classList.add('active');
  window.scrollTo(0,0);

  // Update URL
  history.pushState({ postId: id }, p.title, `?post=${id}`);
  document.title = p.title + ' — Sermfy Blog';

  // Attach lightbox to images
  setTimeout(() => {
    document.querySelectorAll('#post-body img').forEach(img => {
      img.onclick = () => openLightbox(img.src);
      img.style.cursor = 'zoom-in';
    });
  }, 100);
}

function showList() {
  document.getElementById('page-post').classList.remove('active');
  document.getElementById('page-search').style.display = 'none';
  document.getElementById('page-list').style.display = 'block';
  window.scrollTo(0,0);
  history.pushState({}, 'Sermfy Blog', window.location.pathname);
  document.title = 'Sermfy Blog';
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
let searchTimer;
function handleSearch(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) return;
  searchTimer = setTimeout(() => doSearch(q), 350);
}

function doSearch(q) {
  if (!q.trim()) return;
  const query = q.trim().toLowerCase();
  const results = allPosts.filter(p =>
    (p.title||'').toLowerCase().includes(query) ||
    strip(p.body||'').toLowerCase().includes(query) ||
    (p.tag||'').toLowerCase().includes(query) ||
    (p.author||'').toLowerCase().includes(query)
  );
  document.getElementById('sr-title').textContent = `Search: "${q}"`;
  document.getElementById('sr-sub').textContent = results.length
    ? `${results.length} article${results.length!==1?'s':''} found`
    : 'No results found — try different keywords';
  document.getElementById('sr-results').innerHTML = results.map((p,i) => buildCard(p,i)).join('') ||
    '<div class="empty-state"><h3>No results</h3><p>Try different keywords.</p></div>';
  document.getElementById('page-list').style.display = 'none';
  document.getElementById('page-post').classList.remove('active');
  document.getElementById('page-search').style.display = 'block';
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function toast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-inp').focus();
  }
});

// Handle browser back/forward
window.addEventListener('popstate', e => {
  if (e.state?.postId) openPost(e.state.postId);
  else showList();
});

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
(async () => {
  allPosts = await sbFetch('');
  renderList(allPosts);

  // Check URL for direct post link (?post=id)
  const params = new URLSearchParams(window.location.search);
  const postId = params.get('post');
  if (postId) {
    const post = allPosts.find(p => p.id === postId);
    if (post) openPost(postId);
  }
})();
</script>
</body>
